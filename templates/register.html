<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <p class="page-title">Sales Tracker &nbsp;<span>·</span>&nbsp; Register</p>

  <div class="form-wrap">
    <div class="form-header">
      <h1 class="form-heading">Create Account</h1>
      <p class="form-sub">Choose your identity</p>
    </div>

    <div class="form-panel">
      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/register">
        <div class="field">
          <label>Username</label>
          <input type="text" name="username" placeholder="choose a name" autocomplete="off" value="{{ form.username }}">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" name="password" placeholder="at least 4 characters">
        </div>
        <div class="field">
          <label>Confirm Password</label>
          <input type="password" name="confirm" placeholder="repeat your password">
        </div>
        <div class="field">
          <label>Name</label>
          <input type="text" name="name" placeholder="your full name" autocomplete="off" value="{{ form.name }}">
        </div>
        <div class="field">
          <label>Address</label>
          <input type="text" name="address" placeholder="your address" autocomplete="off" value="{{ form.address }}">
        </div>
        <div class="field">
          <label>Age</label>
          <input type="number" name="age" placeholder="your age" min="1" value="{{ form.age }}">
        </div>

        <div style="height: 1.2rem;"></div>
        <button type="submit" class="btn btn-primary">Register</button>
      </form>

      <div class="divider"></div>
      <a href="/login" class="btn btn-ghost">Already have an account</a>
    </div>
  </div>

</body>
</html>
